<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Aula 2 - Arrays, Laços e Funções</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f7f7f7;
        color: #222;
      }
      header {
        margin-bottom: 16px;
      }
      h1 {
        font-size: 20px;
        margin: 0;
      }
      p {
        margin: 6px 0 14px;
        color: #444;
      }
      #output {
        background: #111;
        color: #dcdcdc;
        padding: 12px;
        border-radius: 6px;
        min-height: 200px;
        white-space: pre-wrap;
        overflow: auto;
        font-family: monospace;
      }
      .controls {
        margin-bottom: 12px;
      }
      button {
        padding: 8px 12px;
        margin-right: 8px;
        border-radius: 6px;
        border: 1px solid #bbb;
        background: #fff;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
      small {
        color: #666;
        display: block;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Aula 2 — Exemplos: Arrays, For, While, Funções</h1>
      <p>
        Pressione "Executar main.js" para carregar/rodar o script da aula. As
        saídas de console aparecem abaixo.
      </p>
    </header>

    <div class="controls">
      <!-- O botão carrega e executa main.js dinamicamente -->
      <button id="runScript">Executar main.js</button>
      <button id="clearOutput">Limpar saída</button>
      <small
        >Observação: se o seu main.js usar prompt(), as janelas de prompt() irão
        aparecer normalmente.</small
      >
    </div>

    <div id="output" aria-live="polite"></div>

    <!-- redireciona console.log para o #output -->
    <script>
      (function () {
        const out = document.getElementById("output");
        const origLog = console.log;
        const origError = console.error;
        const origWarn = console.warn;

        function writeToOutput(prefix, args) {
          const text = Array.from(args)
            .map((a) => {
              try {
                return typeof a === "object"
                  ? JSON.stringify(a, null, 2)
                  : String(a);
              } catch (e) {
                return String(a);
              }
            })
            .join(" ");
          out.textContent += prefix + text + "\n";
          out.scrollTop = out.scrollHeight;
        }

        console.log = function () {
          writeToOutput("", arguments);
          origLog.apply(console, arguments);
        };
        console.error = function () {
          writeToOutput("ERROR: ", arguments);
          origError.apply(console, arguments);
        };
        console.warn = function () {
          writeToOutput("WARN: ", arguments);
          origWarn.apply(console, arguments);
        };

        // botão para limpar saída
        document.getElementById("clearOutput").addEventListener("click", () => {
          out.textContent = "";
        });

        // Ao clicar, carregamos o main.js dinamicamente para que a execução ocorra sob demanda.
        document.getElementById("runScript").addEventListener("click", () => {
          // Evita carregar várias vezes
          if (document.getElementById("main-js-script")) {
            console.warn(
              "main.js já foi carregado. Recarregue a página para executar novamente."
            );
            return;
          }
          const s = document.createElement("script");
          s.src = "main.js"; // nome do arquivo JS (coloque o seu main.js na mesma pasta)
          s.id = "main-js-script";
          s.onload = () => console.log("main.js carregado e executado.");
          s.onerror = () =>
            console.error(
              "Erro ao carregar main.js. Verifique o caminho e o nome do arquivo."
            );
          document.body.appendChild(s);
        });
      })();
    </script>
  </body>
</html>
